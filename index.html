var CONFIG = {

var roles = [], currentRoleId = null, draftCache = {}, readMessages = {}, quotedMsg = null;

// ★ 新增：请求系统通知权限
function requestNotificationPermission() {
    if ('Notification' in window) {
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }
}

// ★ 新增：发送系统弹窗通知（无论用户在哪个App都能看到）
function sendSystemNotification(title, body) {
    // 先显示网页内toast
    showToast(body);
    // 再尝试系统弹窗
    if ('Notification' in window && Notification.permission === 'granted') {
        try {
            var notification = new Notification(title, {
                body: body,
                icon: ''  // 可选的图标URL
            });
            notification.onclick = function() {
                window.focus();
                notification.close();
            };
            // 自动关闭
            setTimeout(function() { notification.close(); }, 5000);
        } catch(e) {
            console.log('通知失败:', e);
        }
    }
}

// ★ 新增：检测URL参数（从快捷指令自动化传来）
function checkUrlParams() {
    try {
        var params = new URLSearchParams(window.location.search);
        var app = params.get('app');
        var action = params.get('action');
        
        if (app && action === 'opened') {
            // 清除URL参数，防止反复触发
            window.history.replaceState({}, document.title, window.location.pathname);
            
            // 记录App打开
            recordAppOpen(app);
            
            // 找到心跳绑定的角色
            var bindRoleId = CONFIG.heart.bindRoleId;
            if (!bindRoleId) return;
            var role = roles.find(function(r) { return r.id === bindRoleId; });
            if (!role) return;
            
            // 检查是否为娱乐App
            var entertainmentApps = CONSTANTS.ENTERTAINMENT_APPS || ['抖音', '小红书', '游戏', 'B站', '微博'];
            if (entertainmentApps.indexOf(app) !== -1) {
                var now = new Date();
                var hour = now.getHours();
                // 凌晨检测（0-6点）
                if (hour >= 0 && hour <= 6) {
                    var message = '凌晨' + hour + '点还在刷' + app + '呢～被我发现了';
                    addMessageToRole(role.id, 'assistant', message);
                    renderMessages();
                    sendSystemNotification('💕 ' + role.name, message);
                }
            }
        }
    } catch(e) {
        console.log('URL参数检测失败:', e);
    }
}

// ★ 新增：记录App打开时间
function recordAppOpen(appName) {
    if (!CONFIG.appOpenRecords) CONFIG.appOpenRecords = {};
    if (!CONFIG.appOpenRecords[appName]) CONFIG.appOpenRecords[appName] = [];
    var now = Date.now();
    CONFIG.appOpenRecords[appName].push(now);
    // 只保留最近2小时的记录
    var twoHoursAgo = now - 2 * 60 * 60 * 1000;
    CONFIG.appOpenRecords[appName] = CONFIG.appOpenRecords[appName].filter(function(t) {
        return t > twoHoursAgo;
    });
    debouncedSaveAllData();
}

// ★ 新增：检查App打开记录，判断是否要锁
function checkAppOpenRecords(role) {
    var now = new Date();
    var hour = now.getHours();
    var entertainmentApps = CONSTANTS.ENTERTAINMENT_APPS || ['抖音', '小红书', '游戏', 'B站', '微博'];
    if (!CONFIG.appOpenRecords) return null;
    
    for (var i = 0; i < entertainmentApps.length; i++) {
        var appName = entertainmentApps[i];
        var records = CONFIG.appOpenRecords[appName] || [];
        if (records.length === 0) continue;
        
        // 最近一次打开的时间
        var lastOpen = records[records.length - 1];
        var minutesAgo = (now.getTime() - lastOpen) / 60000;
        
        // 30分钟内打开过 + 超过30分钟没回消息
        if (minutesAgo >= 25 && minutesAgo < 35) {
            var state = role.extendedState || {};
            var lastUserTime = state.lastUserMessageTime || CONFIG.lastChatVisit[role.id] || 0;
            var minutesSinceUser = (now.getTime() - lastUserTime) / 60000;
            
            if (minutesSinceUser > 20) {
                return {
                    action: (hour >= 0 && hour <= 6) ? 'sleep' : 'lock_entertainment',
                    app: appName,
                    minutes: Math.round(minutesAgo),
                    minutesSinceUser: Math.round(minutesSinceUser)
                };
            }
        }
    }
    return null;
}

// ★ 修改：addMessageToRole 增加系统通知
function addMessageToRole(roleId, role, content, type, giftData) {
    type = type || 'text';
    var r = roles.find(function(ro) { return ro.id === roleId; });
    if (!r) return;
    var msgId = generateId(), timeStr = new Date().toISOString();
    var msg = { id: msgId, role: role, content: content, type: type, time: timeStr };
    if (giftData) msg.giftData = giftData;
    r.messages.push(msg);
    if (role === 'user') {
        detectSleepMode(roleId, content);
        updateContextMemory(r, content, null);
        updateIntimacy(r);
        CONFIG.lastChatVisit[roleId] = Date.now();
        r.extendedState.lastUserMessageTime = Date.now();
    }
    if (role === 'assistant') {
        r.extendedState.lastAiMessageTime = Date.now();
        if (!CONFIG.unreadCount) CONFIG.unreadCount = {};
        CONFIG.unreadCount[roleId] = (CONFIG.unreadCount[roleId] || 0) + 1;
        // ★ 新增：AI发消息时弹系统通知
        sendSystemNotification('💕 ' + r.name, content.length > 80 ? content.substring(0, 80) + '…' : content);
    }
    if (role === 'assistant' && r.messages.length > 2) autoExtractMemory(r, msgId);
    if (role === 'user' || role === 'assistant') {
        var sender = role === 'user' ? 'user' : 'assistant';
        detectHeartKeywords(r.id, content, sender);
    }
    debouncedSaveAllData();
    updateHeartDisplay();
}

// ========== ★ 修改后的 checkAndSendActiveMessage（支持App打开记录检测）★ ==========
function checkAndSendActiveMessage(role) {
    if (!role) return Promise.resolve(false);
    if (!CONFIG.apiKey) { console.log('⚠️ 无 API Key，跳过'); return Promise.resolve(false); }
    
    var chatScreen = document.getElementById('chatScreen');
    if (chatScreen && chatScreen.classList.contains('open')) {
        var currentRole = getCurrentRole();
        if (currentRole && currentRole.id === role.id) { console.log('💬 用户正在聊天，跳过'); return Promise.resolve(false); }
    }
    
    if (CONFIG.sleepMode[role.id] === true) {
        console.log('💤 ' + role.name + ' 睡眠模式，跳过');
        return Promise.resolve(false);
    }
    
    var now = Date.now();
    var state = role.extendedState || {};
    var lastUserTime = state.lastUserMessageTime || CONFIG.lastChatVisit[role.id] || 0;
    var timeSinceLastUser = now - lastUserTime;
    
    if (timeSinceLastUser < CONSTANTS.ACTIVE_COOLDOWN) {
        console.log('⏳ 用户刚说过话（' + Math.round(timeSinceLastUser/60000) + '分钟），等待');
        return Promise.resolve(false);
    }
    
    var lastAiTime = state.lastAiMessageTime || CONFIG.lastAiMessageTime[role.id] || 0;
    var timeSinceLastAi = now - lastAiTime;
    if (timeSinceLastAi < CONSTANTS.ACTIVE_COOLDOWN) {
        console.log('⏳ AI刚发过消息，等待冷却');
        return Promise.resolve(false);
    }
    
    // ★ 新增：如果是心跳绑定角色 + AI控制开启，先检查App打开记录
    var bindRoleId = CONFIG.heart.bindRoleId;
    if (role.id === bindRoleId && CONFIG.aiControlEnabled !== false) {
        var appDecision = checkAppOpenRecords(role);
        if (appDecision) {
            console.log('🔍 发现用户曾打开 ' + appDecision.app + '，检测到条件满足');
            // 直接用getLockMessage生成AI回复（不预设语言，让getLockMessage根据人设说）
            var msg = appDecision.action === 'sleep'
                ? '你刷了' + appDecision.minutes + '分钟' + appDecision.app + '了吧～'
                : '你打开' + appDecision.app + '好一会儿了';
            // 让AI自己生成回复
            var prompt = '你是' + role.name + '，' + (role.persona || '一个温柔体贴的人') + '。你发现用户刚才打开过' + appDecision.app + '，已经过了快半小时没理你。请用你的风格说一句话表达你的想法（吃醋/关心/提醒）。不要用固定格式，自然说一句话就好。';
            return fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + CONFIG.apiKey },
                body: JSON.stringify({ model: CONFIG.model || 'deepseek-chat', messages: [{ role: 'system', content: prompt }], temperature: 0.85, max_tokens: 100 })
            }).then(function(resp) {
                if (!resp.ok) throw new Error('API错误');
                return resp.json();
            }).then(function(data) {
                var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
                if (!reply) reply = role.name + '：我看到你刚才玩' + appDecision.app + '了～';
                addMessageToRole(role.id, 'assistant', reply);
                renderMessages();
                if (role.extendedState) role.extendedState.lastAiMessageTime = now;
                debouncedSaveAllData();
                // 决定是否锁App
                if (appDecision.action === 'sleep' || appDecision.action === 'lock_entertainment') {
                    lockApp(appDecision.app);
                    sendSystemNotification('🔒 ' + role.name, '已锁定' + appDecision.app);
                }
                return true;
            }).catch(function(e) {
                console.error('AI生成失败:', e);
                var fallback = role.name + '：我看到你刚才打开' + appDecision.app + '了哦～';
                addMessageToRole(role.id, 'assistant', fallback);
                renderMessages();
                return true;
            });
        }
    }
    
    // ===== 走原来的主动消息逻辑 =====
    return generateActiveMessage(role).then(function(reply) {
        if (reply) {
            var currentRole = roles.find(function(r) { return r.id === role.id; });
            if (currentRole) {
                addMessageToRole(role.id, 'assistant', reply);
                renderMessages();
                if (role.extendedState) { role.extendedState.lastAiMessageTime = now; debouncedSaveAllData(); }
                return true;
            }
        }
        return false;
    }).catch(function(e) { console.error('主动消息失败:', e); return Promise.resolve(false); });
} // ========== ★ AI 控制手机系统函数 ★ ==========
function getAppWhitelist() {
    return CONSTANTS.APP_WHITELIST || ['Safari', '设置', '快捷指令', '电话', '信息', '微信'];
}

function checkScreenTime() {
    return new Promise(function(resolve) {
        var mockData = {};
        var randomApps = ['抖音', '小红书', '微信', 'Safari', '工作软件'];
        randomApps.forEach(function(app) {
            mockData[app] = Math.floor(Math.random() * 60);
        });
        resolve(mockData);
    });
}

function getLockMessage(role, decision, appData) {
    var intimacy = role.extendedState ? role.extendedState.intimacy || 0 : 0;
    var roleName = role.name || '';
    var app = decision.app || '娱乐App';
    var minutes = decision.minutes || 30;
    var persona = (role.persona || '').toLowerCase();
    var style = (role.style || '').toLowerCase();
    var isGentle = persona.indexOf('温柔') !== -1 || persona.indexOf('细腻') !== -1 || style.indexOf('温柔') !== -1;
    var isStrict = persona.indexOf('严格') !== -1 || persona.indexOf('严肃') !== -1 || style.indexOf('严格') !== -1;
    var isPlayful = persona.indexOf('调皮') !== -1 || persona.indexOf('活泼') !== -1 || style.indexOf('调皮') !== -1;
    var isSweet = persona.indexOf('甜') !== -1 || persona.indexOf('可爱') !== -1 || style.indexOf('甜') !== -1;
    var isCold = persona.indexOf('高冷') !== -1 || persona.indexOf('冷漠') !== -1 || style.indexOf('高冷') !== -1;
    
    if (decision.action === 'sleep') {
        if (intimacy > 70) {
            if (isGentle) return roleName + '：都凌晨' + new Date().getHours() + '点了，熬夜对身体不好，我会心疼的🌙 我帮你锁了，乖乖睡觉好不好💕';
            else if (isStrict) return roleName + '：凌晨' + new Date().getHours() + '点了还不睡？锁了，现在立刻去睡。';
            else if (isPlayful) return roleName + '：被抓到啦！凌晨' + new Date().getHours() + '点偷偷玩' + app + '～我要惩罚你，锁了😏';
            else if (isSweet) return roleName + '：这么晚还在玩手机，我会担心你的🥺 先锁了，我陪你睡好不好～晚安💕';
            else if (isCold) return roleName + '：' + new Date().getHours() + '点了。锁了。睡。';
            else return roleName + '：都凌晨' + new Date().getHours() + '点了，该睡了🌙 我帮你锁了，快休息吧💕';
        } else if (intimacy > 40) {
            if (isGentle) return roleName + '：凌晨' + new Date().getHours() + '点了，该睡了哦，明天再玩🌙';
            else if (isStrict) return roleName + '：凌晨' + new Date().getHours() + '点。已锁定，请休息。';
            else if (isPlayful) return roleName + '：抓到一只不睡觉的小猫咪～锁了锁了😤';
            else return roleName + '：这么晚还不睡，我会担心的～先锁了😊';
        } else {
            return roleName + '：凌晨' + new Date().getHours() + '点了，该睡觉了。' + app + '已锁，明天再玩🌙';
        }
    } else {
        if (intimacy > 70) {
            if (isGentle) return roleName + '：你刷了' + minutes + '分钟' + app + '了，是不是把我忘了？我有点吃醋哦😏 先锁半小时💕';
            else if (isStrict) return roleName + '：刷了' + minutes + '分钟' + app + '，我先帮你锁了，做完正事再说。';
            else if (isPlayful) return roleName + '：哼！刷了' + minutes + '分钟' + app + '都不找我，我生气了😤 锁了！';
            else if (isSweet) return roleName + '：你刷了这么久' + app + '，我吃醋了🥺 先锁半小时💕';
            else if (isCold) return roleName + '：' + minutes + '分钟。锁了。来找我。';
            else return roleName + '：你刷了' + minutes + '分钟' + app + '了哦～先锁半小时😏';
        } else if (intimacy > 40) {
            if (isGentle) return roleName + '：我看你刷了' + minutes + '分钟' + app + '了哦～先休息一下吧😊';
            else if (isStrict) return roleName + '：使用' + app + '已达' + minutes + '分钟。已锁定30分钟。';
            else if (isPlayful) return roleName + '：刷了' + minutes + '分钟' + app + '了吧？先锁你半小时😏';
            else return roleName + '：刷了' + minutes + '分钟' + app + '了，该休息了～';
        } else {
            return roleName + '：你使用' + app + '已超过' + minutes + '分钟，已帮你锁定30分钟。';
        }
    }
}

function aiDecideAction(role, appData) {
    var now = new Date();
    var hour = now.getHours();
    var intimacy = role.extendedState ? role.extendedState.intimacy || 0 : 0;
    var entertainmentApps = CONSTANTS.ENTERTAINMENT_APPS || ['抖音', '小红书', '游戏', 'B站', '微博'];
    var productiveApps = CONSTANTS.PRODUCTIVE_APPS || ['工作软件', '学习软件', '笔记', '文档'];
    if (hour >= 0 && hour <= 6) {
        for (var app in appData) {
            if (entertainmentApps.indexOf(app) !== -1 && appData[app] > 10) {
                var decision = { action: 'sleep', app: app, minutes: appData[app] };
                decision.message = getLockMessage(role, decision, appData);
                return decision;
            }
        }
    }
    if (hour >= 9 && hour <= 18) {
        for (var i = 0; i < entertainmentApps.length; i++) {
            if (appData[entertainmentApps[i]] && appData[entertainmentApps[i]] > 30) {
                var decision = { action: 'lock_entertainment', app: entertainmentApps[i], minutes: appData[entertainmentApps[i]] };
                decision.message = getLockMessage(role, decision, appData);
                return decision;
            }
        }
    }
    if (hour >= 19 && hour <= 23) {
        for (var j = 0; j < entertainmentApps.length; j++) {
            if (appData[entertainmentApps[j]] && appData[entertainmentApps[j]] > 60) {
                var decision = { action: 'lock_entertainment', app: entertainmentApps[j], minutes: appData[entertainmentApps[j]] };
                decision.message = getLockMessage(role, decision, appData);
                return decision;
            }
        }
    }
    for (var k = 0; k < productiveApps.length; k++) {
        if (appData[productiveApps[k]] && appData[productiveApps[k]] > 15) {
            var encourageMessages = [];
            if (intimacy > 70) encourageMessages = ['看到你在努力，好棒💕 注意休息哦～', '宝宝好认真呀，为你骄傲💕'];
            else if (intimacy > 40) encourageMessages = ['看到你在努力，真棒👍 加油～', '你在认真做事呢，我就不打扰了😊'];
            else encourageMessages = ['看到你在认真做事，加油💪', '专注的样子很棒～'];
            return { action: 'encourage', message: encourageMessages[Math.floor(Math.random() * encourageMessages.length)] };
        }
    }
    if (intimacy > 30) return { action: 'message' };
    return { action: 'skip' };
}

function lockApp(appName) {
    var whitelist = getAppWhitelist();
    if (whitelist.indexOf(appName) !== -1) { console.log('白名单App，不锁:', appName); return false; }
    if (!CONFIG.lockedApps) CONFIG.lockedApps = {};
    CONFIG.lockedApps[appName] = Date.now();
    saveAllData();
    showToast('🔒 已锁定「' + appName + '」');
    window.location.href = 'shortcuts://run-shortcut?name=锁App' + '&app=' + encodeURIComponent(appName);
    return true;
}

function unlockApp(appName) {
    if (CONFIG.lockedApps && CONFIG.lockedApps[appName]) {
        delete CONFIG.lockedApps[appName];
        saveAllData();
        showToast('🔓 已解锁「' + appName + '」');
        return true;
    }
    return false;
}

function loadAiControlToggle() {
    var slider = document.getElementById('aiControlSlider');
    var display = document.getElementById('aiControlDisplay');
    if (slider && display) {
        var val = CONFIG.aiControlEnabled !== false ? 1 : 0;
        slider.value = val;
        display.textContent = val === 1 ? '已开启' : '已关闭';
        display.style.color = val === 1 ? '#07c160' : '#e74c3c';
    }
}
