<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="时光胶囊" />
    <title>时光胶囊 - 我的AI空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 0; margin: 0; }
        .phone-frame { width: 100%; max-width: 430px; height: 100vh; max-height: 100vh; background: #1a1a1a; border-radius: 0; box-shadow: none; overflow: hidden; position: relative; transition: background 0.3s ease, color 0.3s ease; }
        :root { --bg-primary: #1a1a1a; --bg-secondary: #ededed; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #999; --border-color: rgba(217,217,217,0.5); --shadow-color: rgba(0,0,0,0.06); --header-bg: rgba(255,255,255,0.92); --safe-top: 0px; --safe-bottom: 0px; --tab-active: #a29bfe; --heart-color: #ff6b81; }
        @supports (padding: env(safe-area-inset-top)) { :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); } }
        [data-theme="light"] { --bg-primary: #f0f0f0; --bg-secondary: #fafafa; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #888; --border-color: rgba(0,0,0,0.08); --shadow-color: rgba(0,0,0,0.04); --header-bg: rgba(255,255,255,0.95); }
        ::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-thumb { background: rgba(192,192,192,0.5); border-radius: 4px; } ::-webkit-scrollbar-track { background: transparent; }

        /* 顶部导航 */
        .memory-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: calc(12px + var(--safe-top, 0px)) 16px 12px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-height: 52px; position: relative; z-index: 2; }
        .memory-header .back-btn { font-size: 20px; color: #576b95; cursor: pointer; border: none; background: none; padding: 4px; }
        .memory-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 8px; }
        .memory-header .title i { color: #a29bfe; }
        .memory-header .header-actions { display: flex; gap: 10px; }
        .memory-header .header-actions button { background: none; border: none; font-size: 16px; color: var(--text-secondary); cursor: pointer; padding: 4px; transition: 0.15s; }
        .memory-header .header-actions button:active { transform: scale(0.9); }

        /* 角色选择器 */
        .role-selector-bar { background: var(--header-bg); backdrop-filter: blur(10px); padding: 8px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .role-selector-bar label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .role-selector-bar select { flex: 1; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-card); font-size: 13px; color: var(--text-primary); outline: none; max-width: 140px; }
        .role-selector-bar select:focus { border-color: #a29bfe; }

        /* 关系卡片 */
        .relation-card { background: var(--bg-card); margin: 10px 14px 6px; border-radius: 14px; padding: 14px 16px; box-shadow: 0 2px 12px var(--shadow-color); border: 1px solid var(--border-color); flex-shrink: 0; }
        .relation-card .rc-title { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 8px; font-weight: 500; }
        .relation-card .rc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; text-align: center; }
        .relation-card .rc-grid .rc-item { padding: 4px 0; }
        .relation-card .rc-grid .rc-item .rc-number { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .relation-card .rc-grid .rc-item .rc-number.heart-color { color: var(--heart-color); }
        .relation-card .rc-grid .rc-item .rc-label { font-size: 9px; color: var(--text-secondary); margin-top: 1px; }
        .relation-card .rc-progress { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .relation-card .rc-progress .rc-bar { flex: 1; height: 6px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
        .relation-card .rc-progress .rc-bar .rc-fill { height: 100%; background: linear-gradient(90deg, #a29bfe, #6c5ce7); border-radius: 4px; transition: width 0.6s ease; }
        .relation-card .rc-progress .rc-percent { font-size: 12px; font-weight: 600; color: #a29bfe; min-width: 36px; text-align: right; }
        .relation-card .rc-stages { display: flex; justify-content: space-between; margin-top: 4px; font-size: 8px; color: var(--text-secondary); padding: 0 2px; }
        .relation-card .rc-stages .stage { opacity: 0.3; transition: opacity 0.3s; }
        .relation-card .rc-stages .stage.active { opacity: 1; color: #a29bfe; font-weight: 600; }

        /* Tab切换 */
        .tab-bar { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .tab-bar .tab-btn { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: 0.2s; font-family: inherit; }
        .tab-bar .tab-btn.active { color: #a29bfe; border-bottom-color: #a29bfe; }
        .tab-bar .tab-btn:active { transform: scale(0.95); }
        .tab-bar .tab-btn .tab-icon { margin-right: 4px; }

        /* 内容区域 */
        .tab-content { flex: 1; overflow-y: auto; padding: 10px 14px 16px; -webkit-overflow-scrolling: touch; }
        .tab-panel { display: none; animation: fadeInUp 0.25s ease; }
        .tab-panel.active { display: block; }

        /* 卡片列表 */
        .timeline-item { background: var(--bg-card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 6px var(--shadow-color); border-left: 3px solid #a29bfe; position: relative; transition: 0.15s; }
        .timeline-item:active { transform: scale(0.99); }
        .timeline-item .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .timeline-item .item-header .item-time { font-size: 10px; color: var(--text-secondary); }
        .timeline-item .item-header .item-actions { display: flex; gap: 4px; }
        .timeline-item .item-header .item-actions button { background: none; border: none; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 2px 4px; transition: 0.15s; }
        .timeline-item .item-header .item-actions button:active { transform: scale(0.85); }
        .timeline-item .item-header .item-actions .del-btn { color: #e74c3c; opacity: 0.4; }
        .timeline-item .item-header .item-actions .del-btn:active { opacity: 1; }
        .timeline-item .item-content { font-size: 13px; color: var(--text-primary); line-height: 1.6; word-break: break-word; }
        .timeline-item .item-content .item-emoji { font-size: 16px; margin-right: 4px; }
        .timeline-item .item-footer { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 8px; }
        .timeline-item .item-footer .jump-btn { font-size: 10px; color: #576b95; cursor: pointer; background: none; border: none; font-family: inherit; padding: 2px 6px; border-radius: 4px; transition: 0.15s; }
        .timeline-item .item-footer .jump-btn:active { background: var(--bg-secondary); }
        .timeline-item .item-badge { font-size: 9px; padding: 1px 8px; border-radius: 10px; background: var(--bg-secondary); color: var(--text-secondary); }
        .timeline-item .item-badge.core { background: #a29bfe20; color: #a29bfe; }
        .timeline-item .item-badge.recent { background: #fdcb6e20; color: #fdcb6e; }
        .timeline-item .item-badge.archived { background: #b2bec320; color: #b2bec3; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 44px; opacity: 0.2; display: block; margin-bottom: 12px; color: #a29bfe; }
        .empty-state p { font-size: 13px; line-height: 1.6; }
        .empty-state .empty-hint { font-size: 11px; color: var(--text-secondary); opacity: 0.6; margin-top: 4px; }

        /* 删除确认弹窗 */
        .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100; display: none; justify-content: center; align-items: center; }
        .confirm-overlay.active { display: flex; }
        .confirm-dialog { background: var(--bg-card); border-radius: 16px; padding: 24px 20px 18px; max-width: 300px; width: 88%; animation: fadeInUp 0.25s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .confirm-dialog h3 { font-size: 16px; color: var(--text-primary); text-align: center; margin-bottom: 4px; }
        .confirm-dialog p { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 16px; line-height: 1.5; }
        .confirm-dialog .btn-group { display: flex; gap: 8px; }
        .confirm-dialog .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .confirm-dialog .btn-group button:active { transform: scale(0.97); }
        .confirm-dialog .btn-group .btn-confirm { background: #e74c3c; color: #fff; }
        .confirm-dialog .btn-group .btn-cancel { background: var(--bg-secondary); color: var(--text-secondary); }

        /* Toast */
        .custom-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px; border-radius: 10px; font-size: 13px; z-index: 200; animation: fadeInUp 0.3s ease; text-align: center; max-width: 80%; }
        [data-theme="light"] .custom-toast { background: rgba(40,40,40,0.85); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 460px) { .phone-frame { border-radius: 0; height: 100vh; max-height: 100vh; } body { padding: 0; } }
        @media (min-width: 431px) { .phone-frame { border-radius: 32px; height: 780px; max-height: 90vh; box-shadow: 0 20px 60px rgba(0,0,0,0.6); } body { padding: 12px; } }
    </style>
</head>
<body>
<div class="phone-frame" id="app">
    <!-- 顶部导航 -->
    <div class="memory-header">
        <button class="back-btn" id="backBtn"><i class="fas fa-chevron-left"></i></button>
        <div class="title"><i class="fas fa-brain"></i> 时光胶囊</div>
        <div class="header-actions">
            <button id="refreshBtn" title="刷新数据"><i class="fas fa-sync-alt"></i></button>
            <button id="themeToggleBtn" title="切换主题"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
    </div>

    <!-- 角色选择器 -->
    <div class="role-selector-bar">
        <label><i class="fas fa-user"></i> 角色</label>
        <select id="roleSelector"></select>
    </div>

    <!-- 关系卡片 -->
    <div class="relation-card" id="relationCard">
        <div class="rc-title">💕 关系概览</div>
        <div class="rc-grid">
            <div class="rc-item"><div class="rc-number heart-color" id="intimacyValue">0%</div><div class="rc-label">亲密度</div></div>
            <div class="rc-item"><div class="rc-number" id="daysValue">0</div><div class="rc-label">相识天数</div></div>
            <div class="rc-item"><div class="rc-number" id="stageValue">--</div><div class="rc-label">当前阶段</div></div>
            <div class="rc-item"><div class="rc-number" id="msgCountValue">0</div><div class="rc-label">消息总数</div></div>
        </div>
        <div class="rc-progress">
            <div class="rc-bar"><div class="rc-fill" id="intimacyBar" style="width:0%;"></div></div>
            <span class="rc-percent" id="intimacyPercent">0%</span>
        </div>
        <div class="rc-stages" id="stageLabels">
            <span class="stage" data-stage="0">初识</span>
            <span class="stage" data-stage="1">熟悉</span>
            <span class="stage" data-stage="2">亲密</span>
            <span class="stage" data-stage="3">依赖</span>
            <span class="stage" data-stage="4">灵魂伴侣</span>
        </div>
    </div>

    <!-- Tab切换 -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="summary"><span class="tab-icon">📝</span>对话摘要</button>
        <button class="tab-btn" data-tab="logs"><span class="tab-icon">📖</span>生活日志</button>
        <button class="tab-btn" data-tab="memory"><span class="tab-icon">🧠</span>记忆库</button>
    </div>

    <!-- 内容区域 -->
    <div class="tab-content" id="tabContent">
        <!-- 对话摘要 -->
        <div class="tab-panel active" id="panelSummary"></div>
        <!-- 生活日志 -->
        <div class="tab-panel" id="panelLogs"></div>
        <!-- 记忆库 -->
        <div class="tab-panel" id="panelMemory"></div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <h3 id="confirmTitle">确认删除</h3>
            <p id="confirmMessage">确定要删除这条内容吗？</p>
            <div class="btn-group">
                <button class="btn-confirm" id="confirmBtn">删除</button>
                <button class="btn-cancel" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="custom-toast" id="toast" style="display:none;"></div>
</div> <script>
// ============================================================
//  📦 时光胶囊 v1.0
//  独立记忆系统 - 对话摘要 / 生活日志 / 记忆库
//  完全兼容主应用数据 ✅
// ============================================================

// ========== 全局状态 ==========
var roles = [];
var currentRoleId = null;
var currentTab = 'summary';
var toastTimer = null;
var deleteTarget = null;
var CONFIG = { theme: 'dark' };

// ========== 工具函数 ==========
function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    text = String(text);
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getLevel(value) {
    var levels = [
        { max: 20, label: '平静' },
        { max: 40, label: '微动' },
        { max: 60, label: '心动' },
        { max: 80, label: '热烈' },
        { max: 95, label: '沸腾' },
        { max: 100, label: '灵魂共振' }
    ];
    for (var i = 0; i < levels.length; i++) {
        if (value <= levels[i].max) return levels[i].label;
    }
    return '灵魂共振';
}

function getIntimacyLevel(intimacy) {
    if (intimacy < 20) return '初识';
    if (intimacy < 40) return '熟悉';
    if (intimacy < 60) return '亲密';
    if (intimacy < 80) return '依赖';
    return '灵魂伴侣';
}

function getStageIndex(intimacy) {
    if (intimacy < 20) return 0;
    if (intimacy < 40) return 1;
    if (intimacy < 60) return 2;
    if (intimacy < 80) return 3;
    return 4;
}

function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.style.display = 'none'; }, 2500);
}

function getDaysBetween(date1, date2) {
    var d1 = new Date(date1);
    var d2 = new Date(date2);
    var diff = d2.getTime() - d1.getTime();
    return Math.max(0, Math.floor(diff / (24 * 60 * 60 * 1000)));
}

function getTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateDisplay(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var today = getTodayKey();
    var targetKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if (targetKey === today) return '今天 ' + d.toTimeString().slice(0, 5);
    var yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    var yesterdayKey = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');
    if (targetKey === yesterdayKey) return '昨天 ' + d.toTimeString().slice(0, 5);
    return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + d.toTimeString().slice(0, 5);
}

// ========== 数据加载 ==========
function loadData() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) {
            showToast('⚠️ 未找到数据，请先使用主应用');
            return false;
        }
        var data = JSON.parse(raw);
        if (!data.roles || !Array.isArray(data.roles) || data.roles.length === 0) {
            showToast('⚠️ 数据为空，请先创建角色');
            return false;
        }

        roles = data.roles;
        // 确保每个角色都有 extendedState 和 summaryHistory
        roles.forEach(function(role) {
            if (!role.extendedState) {
                role.extendedState = {
                    lifeLogs: [],
                    lastActiveMessage: { time: null, content: '', topic: '' },
                    intimacy: 0,
                    contextMemory: { lastTopic: '', lastUserEmotion: '', lastUserMessage: '', lastConversationSummary: '' },
                    lastUserMessageTime: 0,
                    lastAiMessageTime: 0,
                    messageCount: 0,
                    totalHeartSpikes: 0,
                    contextSummary: '你们还没有深入聊过，ta好像还在了解你。',
                    summaryHistory: []
                };
            }
            if (!role.extendedState.summaryHistory || !Array.isArray(role.extendedState.summaryHistory)) {
                role.extendedState.summaryHistory = [];
            }
            if (!role.extendedState.lifeLogs || !Array.isArray(role.extendedState.lifeLogs)) {
                role.extendedState.lifeLogs = [];
            }
            if (!role.heartData) {
                role.heartData = { value: 65, restingValue: 65, peakValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
            }
            if (!Array.isArray(role.memory)) {
                role.memory = [];
            }
            if (!Array.isArray(role.messages)) {
                role.messages = [];
            }
        });

        // 从URL获取角色ID，否则用保存的currentRoleId
        var params = new URLSearchParams(window.location.search);
        var urlRoleId = params.get('roleId');
        if (urlRoleId && roles.find(function(r) { return r.id === urlRoleId; })) {
            currentRoleId = urlRoleId;
        } else {
            currentRoleId = data.currentRoleId || roles[0].id;
        }

        // 加载主题
        if (data.config && data.config.theme) {
            CONFIG.theme = data.config.theme;
            applyTheme(CONFIG.theme);
        }

        return true;
    } catch (e) {
        console.error('加载数据失败:', e);
        showToast('❌ 加载数据失败');
        return false;
    }
}

function saveData() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        data.roles = roles;
        data.currentRoleId = currentRoleId;
        if (data.config) {
            data.config.theme = CONFIG.theme;
        }
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
    } catch (e) {
        console.error('保存数据失败:', e);
    }
}

// ========== 主题切换 ==========
function applyTheme(theme) {
    if (theme === 'auto') {
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } else {
        document.documentElement.setAttribute('data-theme', theme);
    }
    var icon = document.getElementById('themeIcon');
    if (icon) {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }
    CONFIG.theme = theme;
}

function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    saveData();
    showToast('🌓 已切换至 ' + (next === 'dark' ? '深色' : '浅色') + ' 模式');
}

// ========== 获取当前角色 ==========
function getCurrentRole() {
    return roles.find(function(r) { return r.id === currentRoleId; }) || roles[0] || null;
}

// ========== 角色选择器渲染 ==========
function renderRoleSelector() {
    var selector = document.getElementById('roleSelector');
    selector.innerHTML = '';
    roles.forEach(function(role) {
        var opt = document.createElement('option');
        opt.value = role.id;
        opt.textContent = role.name;
        selector.appendChild(opt);
    });
    if (currentRoleId && roles.find(function(r) { return r.id === currentRoleId; })) {
        selector.value = currentRoleId;
    } else if (roles.length > 0) {
        selector.value = roles[0].id;
        currentRoleId = roles[0].id;
    }
    selector.addEventListener('change', function() {
        currentRoleId = this.value;
        saveData();
        renderAll();
    });
}

// ========== 关系卡片渲染 ==========
function renderRelationCard(role) {
    if (!role) return;
    var intimacy = role.extendedState ? role.extendedState.intimacy || 0 : 0;
    var messages = role.messages || [];
    var createdAt = role.createdAt || new Date().toISOString();
    var days = getDaysBetween(createdAt, new Date());
    var stage = getIntimacyLevel(intimacy);
    var stageIdx = getStageIndex(intimacy);

    document.getElementById('intimacyValue').textContent = intimacy + '%';
    document.getElementById('daysValue').textContent = days;
    document.getElementById('stageValue').textContent = stage;
    document.getElementById('msgCountValue').textContent = messages.length;

    var bar = document.getElementById('intimacyBar');
    var percent = Math.min(100, intimacy);
    bar.style.width = percent + '%';
    document.getElementById('intimacyPercent').textContent = percent + '%';

    // 更新阶段高亮
    document.querySelectorAll('#stageLabels .stage').forEach(function(el) {
        var idx = parseInt(el.dataset.stage);
        el.classList.toggle('active', idx === stageIdx);
    });
}

// ========== 对话摘要渲染 ==========
function renderSummary(role) {
    var panel = document.getElementById('panelSummary');
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var history = role.extendedState ? role.extendedState.summaryHistory || [] : [];
    // 也显示当前的 contextSummary（如果历史为空但有当前摘要）
    var currentSummary = role.extendedState ? role.extendedState.contextSummary || '' : '';

    if (history.length === 0 && !currentSummary) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i><p>还没有对话摘要</p><span class="empty-hint">多聊聊天，我会帮你记录重要的对话 💕</span></div>';
        return;
    }

    var html = '';
    // 先显示当前摘要（如果有且不在历史中）
    if (currentSummary && currentSummary !== '你们还没有深入聊过，ta好像还在了解你。') {
        var exists = history.some(function(h) { return h.content === currentSummary && h.isCurrent; });
        if (!exists) {
            html += '<div class="timeline-item" style="border-left-color:#6c5ce7;">';
            html += '<div class="item-header"><span class="item-time">📌 当前摘要</span><div class="item-actions"><button class="del-btn" data-type="summary_current" title="删除"><i class="fas fa-times"></i></button></div></div>';
            html += '<div class="item-content">' + escapeHtml(currentSummary) + '</div>';
            html += '<div class="item-footer"><span class="item-badge" style="background:#6c5ce720;color:#6c5ce7;">最新</span></div>';
            html += '</div>';
        }
    }

    // 显示历史摘要（按时间倒序）
    var sorted = history.slice().sort(function(a, b) {
        return new Date(b.time) - new Date(a.time);
    });

    sorted.forEach(function(item) {
        var timeDisplay = formatDateDisplay(item.time);
        html += '<div class="timeline-item">';
        html += '<div class="item-header"><span class="item-time">📅 ' + timeDisplay + '</span><div class="item-actions"><button class="del-btn" data-type="summary" data-id="' + item.id + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
        html += '<div class="item-content">' + escapeHtml(item.content) + '</div>';
        if (item.msgId) {
            html += '<div class="item-footer"><button class="jump-btn" data-msgid="' + item.msgId + '"><i class="fas fa-comment"></i> 跳转到聊天</button></div>';
        } else {
            html += '<div class="item-footer"><span class="item-badge">已归档</span></div>';
        }
        html += '</div>';
    });

    panel.innerHTML = html;

    // 绑定删除事件
    panel.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var type = this.dataset.type;
            var id = this.dataset.id;
            if (type === 'summary_current') {
                showConfirm('删除当前摘要', '确定要删除当前摘要吗？', function() {
                    if (role.extendedState) {
                        role.extendedState.contextSummary = '你们还没有深入聊过，ta好像还在了解你。';
                        saveData();
                        renderAll();
                        showToast('✅ 已删除当前摘要');
                    }
                });
            } else if (type === 'summary' && id) {
                showConfirm('删除摘要', '确定要删除这条对话摘要吗？', function() {
                    if (role.extendedState && role.extendedState.summaryHistory) {
                        var idx = role.extendedState.summaryHistory.findIndex(function(s) { return s.id === id; });
                        if (idx !== -1) {
                            role.extendedState.summaryHistory.splice(idx, 1);
                            saveData();
                            renderAll();
                            showToast('✅ 已删除摘要');
                        }
                    }
                });
            }
        });
    });

    // 绑定跳转事件
    panel.querySelectorAll('.jump-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var msgId = this.dataset.msgid;
            var roleId = role.id;
            // 跳转到主应用并打开聊天
            var url = 'index.html?chat=' + roleId + '&msg=' + msgId;
            window.location.href = url;
        });
    });
}

// ========== 生活日志渲染 ==========
function renderLogs(role) {
    var panel = document.getElementById('panelLogs');
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var logs = role.extendedState ? role.extendedState.lifeLogs || [] : [];
    if (logs.length === 0) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>还没有生活日志</p><span class="empty-hint">AI会记录TA的日常点滴，多聊聊天吧 🌸</span></div>';
        return;
    }

    var sorted = logs.slice().sort(function(a, b) {
        return new Date(b.date) - new Date(a.date);
    });

    var html = '';
    sorted.forEach(function(log) {
        var timeDisplay = formatDateDisplay(log.date);
        var statusText = log.sent ? '已分享' : '待分享';
        var statusClass = log.sent ? '' : 'style="background:#fdcb6e20;color:#fdcb6e;"';
        html += '<div class="timeline-item" style="border-left-color:#fdcb6e;">';
        html += '<div class="item-header"><span class="item-time">📅 ' + timeDisplay + '</span><div class="item-actions"><button class="del-btn" data-logid="' + (log.id || '') + '" data-logidx="' + sorted.indexOf(log) + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
        html += '<div class="item-content"><span class="item-emoji">' + (log.emoji || '📝') + '</span>' + escapeHtml(log.content) + '</div>';
        html += '<div class="item-footer"><span class="item-badge" ' + statusClass + '>' + statusText + '</span></div>';
        html += '</div>';
    });

    panel.innerHTML = html;

    // 绑定删除事件
    panel.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var logId = this.dataset.logid;
            var logIdx = parseInt(this.dataset.logidx);
            showConfirm('删除日志', '确定要删除这条生活日志吗？', function() {
                if (role.extendedState && role.extendedState.lifeLogs) {
                    if (logId) {
                        var idx = role.extendedState.lifeLogs.findIndex(function(l) { return l.id === logId; });
                        if (idx !== -1) role.extendedState.lifeLogs.splice(idx, 1);
                    } else if (!isNaN(logIdx) && logIdx < role.extendedState.lifeLogs.length) {
                        role.extendedState.lifeLogs.splice(logIdx, 1);
                    }
                    saveData();
                    renderAll();
                    showToast('✅ 已删除日志');
                }
            });
        });
    });
}

// ========== 记忆库渲染 ==========
function renderMemory(role) {
    var panel = document.getElementById('panelMemory');
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-brain"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var memories = role.memory || [];
    if (memories.length === 0) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>还没有保存任何记忆</p><span class="empty-hint">聊天中会慢慢积累关于你的事 📭</span></div>';
        return;
    }

    // 分组：核心记忆 / 近期记忆 / 归档
    var core = memories.filter(function(m) { return m.level === 'core' || !m.level; });
    var recent = memories.filter(function(m) { return m.level === 'recent'; });
    var archived = memories.filter(function(m) { return m.level === 'archived'; });

    var html = '';

    if (core.length > 0) {
        html += '<div style="font-size:11px;color:var(--text-secondary);font-weight:500;margin:6px 0 4px;padding-left:4px;">📌 核心记忆</div>';
        core.forEach(function(mem, idx) {
            var text = mem.text || mem;
            if (typeof text !== 'string') text = text.text || '';
            html += '<div class="timeline-item" style="border-left-color:#a29bfe;">';
            html += '<div class="item-header"><span class="item-time">💎 永久</span><div class="item-actions"><button class="del-btn" data-memtype="core" data-memidx="' + idx + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
            html += '<div class="item-content">' + escapeHtml(text) + '</div>';
            html += '<div class="item-footer"><span class="item-badge core">核心</span></div>';
            html += '</div>';
        });
    }

    if (recent.length > 0) {
        html += '<div style="font-size:11px;color:var(--text-secondary);font-weight:500;margin:6px 0 4px;padding-left:4px;">🕐 近期记忆</div>';
        recent.forEach(function(mem, idx) {
            var text = mem.text || mem;
            if (typeof text !== 'string') text = text.text || '';
            var timeDisplay = mem.timestamp ? formatDateDisplay(new Date(mem.timestamp)) : '近期';
            html += '<div class="timeline-item" style="border-left-color:#fdcb6e;">';
            html += '<div class="item-header"><span class="item-time">' + timeDisplay + '</span><div class="item-actions"><button class="del-btn" data-memtype="recent" data-memidx="' + idx + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
            html += '<div class="item-content">' + escapeHtml(text) + '</div>';
            html += '<div class="item-footer"><span class="item-badge recent">近期</span></div>';
            html += '</div>';
        });
    }

    if (archived.length > 0) {
        html += '<div style="font-size:11px;color:var(--text-secondary);font-weight:500;margin:6px 0 4px;padding-left:4px;">📦 归档记忆</div>';
        archived.forEach(function(mem, idx) {
            var text = mem.text || mem;
            if (typeof text !== 'string') text = text.text || '';
            html += '<div class="timeline-item" style="border-left-color:#b2bec3;opacity:0.7;">';
            html += '<div class="item-header"><span class="item-time">📦 已归档</span><div class="item-actions"><button class="del-btn" data-memtype="archived" data-memidx="' + idx + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
            html += '<div class="item-content">' + escapeHtml(text) + '</div>';
            html += '<div class="item-footer"><span class="item-badge archived">归档</span></div>';
            html += '</div>';
        });
    }

    panel.innerHTML = html;

    // 绑定删除事件
    panel.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var memType = this.dataset.memtype;
            var memIdx = parseInt(this.dataset.memidx);
            var targetMem = null;
            var targetArr = [];

            if (memType === 'core') targetArr = core;
            else if (memType === 'recent') targetArr = recent;
            else if (memType === 'archived') targetArr = archived;

            if (targetArr && memIdx < targetArr.length) {
                targetMem = targetArr[memIdx];
            }

            showConfirm('删除记忆', '确定要删除这条记忆吗？', function() {
                if (targetMem && role.memory) {
                    var idx = role.memory.indexOf(targetMem);
                    if (idx !== -1) {
                        role.memory.splice(idx, 1);
                        saveData();
                        renderAll();
                        showToast('✅ 已删除记忆');
                    }
                }
            });
        });
    });
}

// ========== 确认弹窗 ==========
var confirmCallback = null;

function showConfirm(title, message, callback) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMessage').textContent = message;
    document.getElementById('confirmOverlay').classList.add('active');
    confirmCallback = callback;
}

document.getElementById('confirmBtn').addEventListener('click', function() {
    document.getElementById('confirmOverlay').classList.remove('active');
    if (confirmCallback) {
        confirmCallback();
        confirmCallback = null;
    }
});

document.getElementById('cancelBtn').addEventListener('click', function() {
    document.getElementById('confirmOverlay').classList.remove('active');
    confirmCallback = null;
});

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
        this.classList.remove('active');
        confirmCallback = null;
    }
});

// ========== 主渲染 ==========
function renderAll() {
    var role = getCurrentRole();
    if (!role) {
        document.getElementById('panelSummary').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        document.getElementById('panelLogs').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        document.getElementById('panelMemory').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        return;
    }

    renderRelationCard(role);
    renderSummary(role);
    renderLogs(role);
    renderMemory(role);
}

// ========== Tab切换 ==========
function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentTab = this.dataset.tab;

            document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            var panelId = 'panel' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1);
            var panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');

            // 重新渲染当前Tab
            var role = getCurrentRole();
            if (currentTab === 'summary') renderSummary(role);
            else if (currentTab === 'logs') renderLogs(role);
            else if (currentTab === 'memory') renderMemory(role);
        });
    });
}

// ========== 返回主应用 ==========
function goBack() {
    // 如果有 URL 参数中的来源，跳转回去
    var params = new URLSearchParams(window.location.search);
    var from = params.get('from');
    if (from === 'index') {
        window.location.href = 'index.html';
    } else {
        window.location.href = 'index.html';
    }
}

// ========== 刷新数据 ==========
function refreshData() {
    loadData();
    renderRoleSelector();
    renderAll();
    showToast('🔄 已刷新');
}

// ========== 监听存储变化 ==========
window.addEventListener('storage', function(e) {
    if (e.key === 'ds_multirole_v2') {
        console.log('📦 检测到数据变化，刷新中...');
        loadData();
        renderRoleSelector();
        renderAll();
    }
});

// ========== 初始化 ==========
function init() {
    if (!loadData()) {
        // 数据加载失败，显示提示
        document.getElementById('panelSummary').innerHTML = '<div class="empty-state"><i class="fas fa-database"></i><p>请先打开主应用</p><span class="empty-hint">在「我的AI空间」中创建角色后，再来这里查看时光胶囊 📦</span></div>';
        document.getElementById('panelLogs').innerHTML = '';
        document.getElementById('panelMemory').innerHTML = '';
        return;
    }

    renderRoleSelector();
    setupTabs();
    renderAll();

    // 监听角色切换
    document.getElementById('roleSelector').addEventListener('change', function() {
        currentRoleId = this.value;
        saveData();
        renderAll();
    });

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', goBack);

    // 刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', refreshData);

    // 主题切换
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

    console.log('📦 时光胶囊 v1.0 已加载');
    console.log('📊 共 ' + roles.length + ' 个角色');
    console.log('💕 当前角色: ' + (getCurrentRole() ? getCurrentRole().name : '无'));
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', init);
</script>
