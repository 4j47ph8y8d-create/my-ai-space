<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="时光胶囊" />
    <title>时光胶囊 - 我的AI空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; padding: 0; margin: 0; }
        .phone-frame {
            width: 100%; max-width: 430px; height: 100vh; max-height: 100vh;
            background: #1a1a2e; border-radius: 0; box-shadow: none;
            overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }
        :root {
            --bg-primary: #1a1a2e; --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.06); --bg-card-hover: rgba(255,255,255,0.10);
            --text-primary: #f0edf5; --text-secondary: #8a84a0;
            --border-color: rgba(255,255,255,0.06); --shadow-color: rgba(0,0,0,0.3);
            --header-bg: rgba(20,20,30,0.85); --safe-top: 0px; --safe-bottom: 0px;
            --tab-active: #a78bfa; --heart-color: #f472b6;
            --gradient-start: #a78bfa; --gradient-end: #6c5ce7;
            --cleanup-badge: #34d399;
        }
        @supports (padding: env(safe-area-inset-top)) { :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); } }

        [data-theme="light"] {
            --bg-primary: #f5f3f7; --bg-secondary: #ebe8f0;
            --bg-card: rgba(255,255,255,0.7); --bg-card-hover: rgba(255,255,255,0.9);
            --text-primary: #1a1a2e; --text-secondary: #6b6580;
            --border-color: rgba(0,0,0,0.06); --shadow-color: rgba(0,0,0,0.04);
            --header-bg: rgba(255,255,255,0.85);
            --gradient-start: #a78bfa; --gradient-end: #7c3aed;
            --cleanup-badge: #059669;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--tab-active); border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ===== 加载动画 ===== */
        .loader-overlay {
            position: absolute; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, transform 0.5s ease;
            pointer-events: none;
        }
        .loader-overlay.hidden { opacity: 0; transform: scale(1.02); pointer-events: none; }
        .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 20px; }
        .rings-container { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border-radius: 50%; border: 1.5px solid transparent; pointer-events: none; }
        .ring-outer { width: 130px; height: 130px; border-color: rgba(167,139,250,0.4); border-top-color: rgba(167,139,250,0.9); border-right-color: rgba(167,139,250,0.15); border-bottom-color: rgba(167,139,250,0.08); animation: spinOuter 2.8s linear infinite; }
        .ring-middle { width: 100px; height: 100px; border-color: rgba(244,114,182,0.35); border-top-color: rgba(244,114,182,0.85); border-right-color: rgba(244,114,182,0.12); border-bottom-color: rgba(244,114,182,0.06); animation: spinMiddle 2s linear infinite reverse; }
        .ring-inner { width: 70px; height: 70px; border-color: rgba(251,191,36,0.3); border-top-color: rgba(251,191,36,0.8); border-right-color: rgba(251,191,36,0.1); border-bottom-color: rgba(251,191,36,0.05); animation: spinInner 1.4s linear infinite; }
        @keyframes spinOuter { to { transform: rotate(360deg); } }
        @keyframes spinMiddle { to { transform: rotate(-360deg); } }
        @keyframes spinInner { to { transform: rotate(360deg); } }

        .capsule-wrapper { position: relative; z-index: 2; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; animation: capsuleFloat 2.5s ease-in-out infinite; }
        .capsule-slant { width: 16px; height: 52px; border-radius: 8px; background: linear-gradient(180deg, #a78bfa, #7c3aed); transform: rotate(35deg); box-shadow: 0 4px 16px rgba(167,139,250,0.2), inset 0 1px 0 rgba(255,255,255,0.08); position: relative; flex-shrink: 0; }
        .capsule-slant::before { content: ''; position: absolute; top: 6px; left: 3px; width: 4px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.05); pointer-events: none; }
        .capsule-slant .line { position: absolute; left: 50%; transform: translateX(-50%); width: 8px; height: 0.5px; background: rgba(255,255,255,0.04); border-radius: 2px; }
        .capsule-slant .line:nth-child(1) { top: 12px; }
        .capsule-slant .line:nth-child(2) { top: 18px; }
        .capsule-slant .line:nth-child(3) { top: 24px; }
        .capsule-slant .line:nth-child(4) { top: 30px; }
        .capsule-slant .line:nth-child(5) { top: 36px; }
        .capsule-slant .dot { position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%; background: rgba(255,255,255,0.04); animation: dotPulse 2s ease-in-out infinite; }
        .capsule-slant .dot:nth-child(6) { top: 8px; right: 3px; animation-delay: 0s; }
        .capsule-slant .dot:nth-child(7) { bottom: 8px; left: 3px; animation-delay: 0.6s; }
        @keyframes dotPulse { 0%,100% { opacity: 0.15; transform: scale(0.8); } 50% { opacity: 0.5; transform: scale(1.2); } }
        @keyframes capsuleFloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.01); } }

        .loader-text { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .loader-text .en { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; animation: textPulse 2s ease-in-out infinite; }
        .loader-text .en .highlight { color: rgba(167,139,250,0.7); }
        .loader-text .zh { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.15); letter-spacing: 6px; animation: textPulse 2s ease-in-out infinite 0.3s; }
        @keyframes textPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        .loader-progress { width: 160px; height: 2px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .loader-progress .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a78bfa, #7c3aed); border-radius: 4px; animation: progressFill 2.5s ease-in-out infinite; }
        @keyframes progressFill { 0% { width: 0%; } 50% { width: 70%; } 80% { width: 90%; } 100% { width: 0%; } }
        .loader-sub { font-size: 10px; color: rgba(255,255,255,0.06); letter-spacing: 2px; margin-top: 2px; }

        [data-theme="light"] .loader-overlay { background: #f5f3f7; }
        [data-theme="light"] .loader-text .en { color: rgba(0,0,0,0.3); }
        [data-theme="light"] .loader-text .zh { color: rgba(0,0,0,0.15); }
        [data-theme="light"] .loader-text .en .highlight { color: rgba(108,92,231,0.7); }
        [data-theme="light"] .loader-progress { background: rgba(0,0,0,0.04); }
        [data-theme="light"] .loader-sub { color: rgba(0,0,0,0.06); }
        [data-theme="light"] .ring-outer { border-color: rgba(108,92,231,0.35); border-top-color: rgba(108,92,231,0.85); border-right-color: rgba(108,92,231,0.12); border-bottom-color: rgba(108,92,231,0.06); }
        [data-theme="light"] .ring-middle { border-color: rgba(244,114,182,0.3); border-top-color: rgba(244,114,182,0.8); border-right-color: rgba(244,114,182,0.1); border-bottom-color: rgba(244,114,182,0.05); }
        [data-theme="light"] .ring-inner { border-color: rgba(251,191,36,0.25); border-top-color: rgba(251,191,36,0.75); border-right-color: rgba(251,191,36,0.08); border-bottom-color: rgba(251,191,36,0.04); }

        /* ===== 主内容 ===== */
        .memory-header {
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: calc(14px + var(--safe-top, 0px)) 16px 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; min-height: 56px; position: relative; z-index: 5;
        }
        .memory-header .back-btn { font-size: 18px; color: var(--text-secondary); cursor: pointer; border: none; background: none; padding: 4px; transition: 0.2s; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .memory-header .back-btn:active { background: var(--bg-card); transform: scale(0.92); }
        .memory-header .title { font-size: 17px; font-weight: 700; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .memory-header .title i { -webkit-text-fill-color: var(--tab-active); font-size: 18px; }
        .memory-header .header-actions { display: flex; gap: 4px; }
        .memory-header .header-actions button { background: none; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 14px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .memory-header .header-actions button:active { background: var(--bg-card); transform: scale(0.92); }

        .role-selector-bar {
            background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 4;
        }
        .role-selector-bar label { font-size: 11px; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .role-selector-bar select { flex: 1; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-card); font-size: 13px; font-weight: 500; color: var(--text-primary); outline: none; max-width: 140px; transition: 0.2s; backdrop-filter: blur(4px); }
        .role-selector-bar select:focus { border-color: var(--tab-active); box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }
        .role-selector-bar select option { background: var(--bg-secondary); color: var(--text-primary); }

        .relation-card {
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            margin: 10px 14px 6px; border-radius: 16px;
            padding: 14px 16px 12px;
            box-shadow: 0 4px 20px var(--shadow-color);
            border: 1px solid var(--border-color);
            flex-shrink: 0; position: relative; z-index: 3;
            overflow: hidden;
        }
        .relation-card::before { content: ''; position: absolute; top: -50%; right: -30%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(167,139,250,0.06), transparent 70%); pointer-events: none; }
        .relation-card .rc-title { font-size: 10px; color: var(--text-secondary); letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
        .relation-card .rc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; text-align: center; position: relative; z-index: 1; }
        .relation-card .rc-grid .rc-item { padding: 2px 0; }
        .relation-card .rc-grid .rc-item .rc-number { font-size: 20px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; transition: 0.3s; }
        .relation-card .rc-grid .rc-item .rc-number.heart-color { color: var(--heart-color); text-shadow: 0 0 30px rgba(244,114,182,0.15); }
        .relation-card .rc-grid .rc-item .rc-label { font-size: 9px; color: var(--text-secondary); margin-top: 1px; font-weight: 400; letter-spacing: 0.3px; }
        .relation-card .rc-progress { margin-top: 10px; display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
        .relation-card .rc-progress .rc-bar { flex: 1; height: 5px; background: var(--border-color); border-radius: 4px; overflow: hidden; }
        .relation-card .rc-progress .rc-bar .rc-fill { height: 100%; background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end), var(--heart-color)); border-radius: 4px; transition: width 0.8s ease; }
        .relation-card .rc-progress .rc-percent { font-size: 12px; font-weight: 700; color: var(--tab-active); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
        .relation-card .rc-stages { display: flex; justify-content: space-between; margin-top: 5px; font-size: 8px; color: var(--text-secondary); padding: 0 2px; position: relative; z-index: 1; }
        .relation-card .rc-stages .stage { opacity: 0.25; transition: all 0.4s ease; font-weight: 400; padding: 1px 4px; border-radius: 4px; }
        .relation-card .rc-stages .stage.active { opacity: 1; color: var(--tab-active); font-weight: 700; background: rgba(167,139,250,0.08); }

        .tab-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; padding: 0 4px;
            position: relative; z-index: 3;
        }
        .tab-bar .tab-btn { flex: 1; padding: 10px 0 8px; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border: none; background: none; border-bottom: 2.5px solid transparent; transition: all 0.25s ease; font-family: inherit; position: relative; }
        .tab-bar .tab-btn .tab-icon { margin-right: 4px; font-size: 13px; }
        .tab-bar .tab-btn.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }
        .tab-bar .tab-btn:active { transform: scale(0.95); }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 14px 16px;
            -webkit-overflow-scrolling: touch;
            position: relative; z-index: 2;
            min-height: 0;
        }
        .tab-panel { display: none; animation: fadeSlideIn 0.35s ease; }
        .tab-panel.active { display: block; }

        /* ===== 记忆库样式 ===== */
        .memory-search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .memory-search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .memory-search-bar input:focus { border-color: var(--tab-active); box-shadow: 0 0 0 3px rgba(167,139,250,0.12); }
        .memory-search-bar input::placeholder { color: var(--text-secondary); opacity: 0.4; }
        .memory-search-bar .search-clear { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 50%; transition: 0.2s; display: none; }
        .memory-search-bar .search-clear.show { display: block; }
        .memory-search-bar .search-clear:active { background: var(--bg-card); transform: scale(0.9); }

        .memory-batch-actions {
            display: none;
            gap: 8px;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            align-items: center;
            justify-content: space-between;
        }
        .memory-batch-actions.show { display: flex; }
        .memory-batch-actions .batch-info { font-size: 12px; color: var(--text-secondary); }
        .memory-batch-actions .batch-info span { color: var(--tab-active); font-weight: 600; }
        .memory-batch-actions .batch-btns { display: flex; gap: 6px; }
        .memory-batch-actions .batch-btns button { padding: 4px 12px; border: none; border-radius: 8px; font-size: 11px; font-weight: 500; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .memory-batch-actions .batch-btns button:active { transform: scale(0.95); }
        .memory-batch-actions .batch-btns .btn-upgrade { background: rgba(167,139,250,0.2); color: var(--tab-active); }
        .memory-batch-actions .batch-btns .btn-delete { background: rgba(248,113,113,0.15); color: #f87171; }
        .memory-batch-actions .batch-btns .btn-cancel { background: var(--border-color); color: var(--text-secondary); }

        .memory-category { margin-bottom: 8px; }
        .memory-category .cat-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .memory-category .cat-header:active { background: var(--bg-card-hover); }
        .memory-category .cat-header .cat-icon { font-size: 14px; }
        .memory-category .cat-header .cat-name { font-size: 12px; font-weight: 600; color: var(--text-primary); flex: 1; }
        .memory-category .cat-header .cat-count { font-size: 10px; color: var(--text-secondary); background: var(--bg-secondary); padding: 1px 8px; border-radius: 10px; }
        .memory-category .cat-header .cat-arrow { font-size: 11px; color: var(--text-secondary); transition: transform 0.3s ease; }
        .memory-category .cat-header .cat-arrow.open { transform: rotate(180deg); }
        .memory-category .cat-header .cat-checkbox { width: 16px; height: 16px; accent-color: var(--tab-active); cursor: pointer; }
        .memory-category .cat-body { padding-left: 4px; margin-top: 4px; display: block; overflow: hidden; transition: max-height 0.3s ease; max-height: 9999px; }
        .memory-category .cat-body.collapsed { max-height: 0; padding: 0; margin: 0; }

        .memory-item-check {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg-card);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 4px;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .memory-item-check .item-checkbox { width: 16px; height: 16px; accent-color: var(--tab-active); cursor: pointer; flex-shrink: 0; }
        .memory-item-check .item-text { flex: 1; font-size: 13px; color: var(--text-primary); line-height: 1.5; word-break: break-word; }
        .memory-item-check .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .memory-item-check .item-actions button { background: none; border: none; font-size: 12px; cursor: pointer; padding: 2px 5px; border-radius: 6px; transition: 0.15s; color: var(--text-secondary); }
        .memory-item-check .item-actions button:active { transform: scale(0.85); background: var(--bg-card); }
        .memory-item-check .item-actions .btn-upgrade-item { color: var(--tab-active); opacity: 0.4; }
        .memory-item-check .item-actions .btn-upgrade-item:active { opacity: 1; }
        .memory-item-check .item-actions .btn-del-item { color: #f87171; opacity: 0.3; }
        .memory-item-check .item-actions .btn-del-item:active { opacity: 1; }

        /* 清理状态标签 */
        .cleanup-badge {
            font-size: 9px;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(52, 211, 153, 0.12);
            color: var(--cleanup-badge);
            margin-left: 4px;
        }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 36px; opacity: 0.15; display: block; margin-bottom: 10px; color: var(--tab-active); }
        .empty-state p { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.6; }
        .empty-state .empty-hint { font-size: 11px; color: var(--text-secondary); opacity: 0.5; margin-top: 4px; }

        .memory-add-section {
            margin-top: 8px;
            padding: 10px 12px;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .memory-add-section input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .memory-add-section input:focus { border-color: var(--tab-active); box-shadow: 0 0 0 3px rgba(167,139,250,0.12); }
        .memory-add-section input::placeholder { color: var(--text-secondary); opacity: 0.4; }
        .memory-add-section .add-mem-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            white-space: nowrap;
        }
        .memory-add-section .add-mem-btn:active { transform: scale(0.95); }
        .memory-add-section .add-mem-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .timeline-item {
            background: var(--bg-card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 14px; padding: 12px 14px;
            margin-bottom: 8px;
            box-shadow: 0 2px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--tab-active);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.4s ease backwards;
        }
        .timeline-item:nth-child(1) { animation-delay: 0.02s; }
        .timeline-item:nth-child(2) { animation-delay: 0.05s; }
        .timeline-item:nth-child(3) { animation-delay: 0.08s; }
        .timeline-item:nth-child(4) { animation-delay: 0.11s; }
        .timeline-item:nth-child(5) { animation-delay: 0.14s; }
        .timeline-item:nth-child(6) { animation-delay: 0.17s; }
        .timeline-item:nth-child(7) { animation-delay: 0.20s; }

        .confirm-dialog p { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 18px; line-height: 1.5; }
        .confirm-dialog .btn-group { display: flex; gap: 8px; }
        .confirm-dialog .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .confirm-dialog .btn-group button:active { transform: scale(0.96); }
        .confirm-dialog .btn-group .btn-confirm { background: linear-gradient(135deg, #f87171, #ef4444); color: #fff; }
        .confirm-dialog .btn-group .btn-cancel { background: var(--border-color); color: var(--text-secondary); }

        .custom-toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<script>
// ============================================================
//  📦 时光胶囊 v1.3 - 自动清理版
//  记忆自动管理：近期(30天)→归档(90天)→删除
//  完全兼容主应用数据 ✅
// ============================================================

// ========== 清理规则 ==========
var CLEANUP_RULES = {
    RECENT_TO_ARCHIVE_DAYS: 30,   // 近期记忆 → 归档记忆（30天）
    ARCHIVE_TO_DELETE_DAYS: 90,   // 归档记忆 → 删除（90天）
    CHECK_INTERVAL: 24 * 60 * 60 * 1000  // 每天检查一次
};

// ========== 全局状态 ==========
var roles = [];
var currentRoleId = null;
var currentTab = 'summary';
var toastTimer = null;
var confirmCallback = null;
var CONFIG = { theme: 'dark' };
var isAddingMemory = false;

var memorySearchKeyword = '';
var selectedMemories = [];
var categoryStates = {
    core: true,
    recent: true,
    archived: true
};

// ========== 工具函数 ==========
function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    text = String(text);
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getLevel(value) {
    var levels = [
        { max: 20, label: '平静' },
        { max: 40, label: '微动' },
        { max: 60, label: '心动' },
        { max: 80, label: '热烈' },
        { max: 95, label: '沸腾' },
        { max: 100, label: '灵魂共振' }
    ];
    for (var i = 0; i < levels.length; i++) {
        if (value <= levels[i].max) return levels[i].label;
    }
    return '灵魂共振';
}

function getIntimacyLevel(intimacy) {
    if (intimacy < 20) return '初识';
    if (intimacy < 40) return '熟悉';
    if (intimacy < 60) return '亲密';
    if (intimacy < 80) return '依赖';
    return '灵魂伴侣';
}

function getStageIndex(intimacy) {
    if (intimacy < 20) return 0;
    if (intimacy < 40) return 1;
    if (intimacy < 60) return 2;
    if (intimacy < 80) return 3;
    return 4;
}

function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(10px)';
    el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    requestAnimationFrame(function() {
        el.style.opacity = '1';
        el.style.transform = 'translateX(-50%) translateY(0)';
    });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(10px)';
        setTimeout(function() { if (el) el.style.display = 'none'; }, 300);
    }, 2500);
}

function getDaysBetween(date1, date2) {
    var d1 = new Date(date1);
    var d2 = new Date(date2);
    var diff = d2.getTime() - d1.getTime();
    return Math.max(0, Math.floor(diff / (24 * 60 * 60 * 1000)));
}

function getTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateDisplay(dateStr) {
    try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '未知时间';
        var now = new Date();
        var today = getTodayKey();
        var targetKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        if (targetKey === today) return '今天 ' + d.toTimeString().slice(0, 5);
        var yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        var yesterdayKey = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');
        if (targetKey === yesterdayKey) return '昨天 ' + d.toTimeString().slice(0, 5);
        return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + d.toTimeString().slice(0, 5);
    } catch (e) { return '未知时间'; }
}

function getMemoryText(mem) {
    var text = mem.text || mem;
    if (typeof text !== 'string') text = text.text || '';
    return text;
}

// ========== 自动清理记忆 ==========
function cleanupMemories() {
    var now = Date.now();
    var recentToArchiveDays = CLEANUP_RULES.RECENT_TO_ARCHIVE_DAYS || 30;
    var archiveToDeleteDays = CLEANUP_RULES.ARCHIVE_TO_DELETE_DAYS || 90;
    var totalCleaned = 0;
    var totalArchived = 0;

    roles.forEach(function(role) {
        if (!Array.isArray(role.memory)) return;
        var newMemory = [];
        var archivedCount = 0;
        var deletedCount = 0;

        role.memory.forEach(function(mem) {
            var timestamp = mem.timestamp || Date.now();
            var age = (now - timestamp) / (24 * 60 * 60 * 1000);
            var level = mem.level || 'core';

            if (level === 'core') {
                // 核心记忆永不删除
                newMemory.push(mem);
                return;
            }

            if (level === 'recent') {
                if (age > recentToArchiveDays) {
                    // 超过30天 → 降级为归档记忆
                    mem.level = 'archived';
                    newMemory.push(mem);
                    archivedCount++;
                    totalArchived++;
                } else {
                    newMemory.push(mem);
                }
                return;
            }

            if (level === 'archived') {
                if (age > archiveToDeleteDays) {
                    // 超过90天 → 删除
                    deletedCount++;
                    totalCleaned++;
                } else {
                    newMemory.push(mem);
                }
                return;
            }

            // 未知类型，保留
            newMemory.push(mem);
        });

        role.memory = newMemory;
    });

    if (totalCleaned > 0 || totalArchived > 0) {
        var msg = '';
        if (totalArchived > 0) msg += '📦 ' + totalArchived + ' 条近期记忆已归档 ';
        if (totalCleaned > 0) msg += '🗑️ ' + totalCleaned + ' 条归档记忆已清理';
        if (msg) {
            showToast('🧹 记忆已自动整理：' + msg);
        }
        saveData();
        // 如果当前在记忆库Tab，刷新视图
        if (currentTab === 'memory') {
            var role = getCurrentRole();
            if (role) renderMemory(role);
        }
        console.log('🧹 记忆清理完成: 归档 ' + totalArchived + ' 条，删除 ' + totalCleaned + ' 条');
    }
}

// ========== 数据加载 ==========
function loadData() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) {
            showToast('⚠️ 未找到数据，请先使用主应用');
            return false;
        }
        var data = JSON.parse(raw);
        if (!data.roles || !Array.isArray(data.roles) || data.roles.length === 0) {
            showToast('⚠️ 数据为空，请先创建角色');
            return false;
        }

        roles = data.roles;
        roles.forEach(function(role) {
            if (!role.extendedState) {
                role.extendedState = {
                    lifeLogs: [],
                    lastActiveMessage: { time: null, content: '', topic: '' },
                    intimacy: 0,
                    contextMemory: { lastTopic: '', lastUserEmotion: '', lastUserMessage: '', lastConversationSummary: '' },
                    lastUserMessageTime: 0,
                    lastAiMessageTime: 0,
                    messageCount: 0,
                    totalHeartSpikes: 0,
                    contextSummary: '你们还没有深入聊过，ta好像还在了解你。',
                    summaryHistory: []
                };
            }
            if (!role.extendedState.summaryHistory || !Array.isArray(role.extendedState.summaryHistory)) {
                role.extendedState.summaryHistory = [];
            }
            if (!role.extendedState.lifeLogs || !Array.isArray(role.extendedState.lifeLogs)) {
                role.extendedState.lifeLogs = [];
            }
            if (!role.heartData) {
                role.heartData = { value: 65, restingValue: 65, peakValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
            }
            if (!Array.isArray(role.memory)) { role.memory = []; }
            if (!Array.isArray(role.messages)) { role.messages = []; }
            if (!role.createdAt) { role.createdAt = new Date().toISOString(); }
        });

        var params = new URLSearchParams(window.location.search);
        var urlRoleId = params.get('roleId');
        if (urlRoleId && roles.find(function(r) { return r.id === urlRoleId; })) {
            currentRoleId = urlRoleId;
        } else {
            currentRoleId = data.currentRoleId || roles[0].id;
        }

        if (data.config && data.config.theme) {
            CONFIG.theme = data.config.theme;
            applyTheme(CONFIG.theme);
        }

        // 加载数据后执行自动清理
        cleanupMemories();

        return true;
    } catch (e) {
        console.error('加载数据失败:', e);
        showToast('❌ 加载数据失败');
        return false;
    }
}

function saveData() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        data.roles = roles;
        data.currentRoleId = currentRoleId;
        if (data.config) { data.config.theme = CONFIG.theme; }
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
    } catch (e) { console.error('保存数据失败:', e); }
}

// ========== 主题切换 ==========
function applyTheme(theme) {
    if (theme === 'auto') {
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } else {
        document.documentElement.setAttribute('data-theme', theme);
    }
    var icon = document.getElementById('themeIcon');
    if (icon) {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }
    CONFIG.theme = theme;
}

function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    saveData();
    showToast('🌓 已切换至 ' + (next === 'dark' ? '深色' : '浅色') + ' 模式');
}

// ========== 获取当前角色 ==========
function getCurrentRole() {
    return roles.find(function(r) { return r.id === currentRoleId; }) || roles[0] || null;
}

// ========== 角色选择器 ==========
function renderRoleSelector() {
    var selector = document.getElementById('roleSelector');
    if (!selector) return;
    selector.innerHTML = '';
    roles.forEach(function(role) {
        var opt = document.createElement('option');
        opt.value = role.id;
        opt.textContent = role.name;
        selector.appendChild(opt);
    });
    if (currentRoleId && roles.find(function(r) { return r.id === currentRoleId; })) {
        selector.value = currentRoleId;
    } else if (roles.length > 0) {
        selector.value = roles[0].id;
        currentRoleId = roles[0].id;
    }
}

// ========== 关系卡片 ==========
function renderRelationCard(role) {
    if (!role) return;
    var intimacy = role.extendedState ? role.extendedState.intimacy || 0 : 0;
    var messages = role.messages || [];
    var createdAt = role.createdAt || new Date().toISOString();
    var days = getDaysBetween(createdAt, new Date());
    var stage = getIntimacyLevel(intimacy);
    var stageIdx = getStageIndex(intimacy);

    var intimacyEl = document.getElementById('intimacyValue');
    var daysEl = document.getElementById('daysValue');
    var stageEl = document.getElementById('stageValue');
    var msgEl = document.getElementById('msgCountValue');
    var bar = document.getElementById('intimacyBar');
    var percentEl = document.getElementById('intimacyPercent');

    var oldIntimacy = intimacyEl ? parseInt(intimacyEl.textContent) || 0 : 0;
    var oldMsg = msgEl ? parseInt(msgEl.textContent) || 0 : 0;

    if (intimacyEl) {
        intimacyEl.textContent = intimacy + '%';
        if (intimacy !== oldIntimacy) {
            intimacyEl.classList.remove('animate');
            void intimacyEl.offsetHeight;
            intimacyEl.classList.add('animate');
        }
    }
    if (daysEl) daysEl.textContent = days;
    if (stageEl) stageEl.textContent = stage;
    if (msgEl) {
        msgEl.textContent = messages.length;
        if (messages.length !== oldMsg) {
            msgEl.classList.remove('animate');
            void msgEl.offsetHeight;
            msgEl.classList.add('animate');
        }
    }

    var percent = Math.min(100, intimacy);
    if (bar) {
        bar.style.transition = 'width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
        bar.style.width = percent + '%';
    }
    if (percentEl) percentEl.textContent = percent + '%';

    document.querySelectorAll('#stageLabels .stage').forEach(function(el) {
        var idx = parseInt(el.dataset.stage);
        el.classList.toggle('active', idx === stageIdx);
    });
}

// ========== 对话摘要 ==========
function renderSummary(role) {
    var panel = document.getElementById('panelSummary');
    if (!panel) return;
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var history = role.extendedState ? role.extendedState.summaryHistory || [] : [];
    var currentSummary = role.extendedState ? role.extendedState.contextSummary || '' : '';

    if (history.length === 0 && !currentSummary) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i><p>还没有对话摘要</p><span class="empty-hint">多聊聊天，我会帮你记录重要的对话 💕</span></div>';
        return;
    }

    var html = '';
    if (currentSummary && currentSummary !== '你们还没有深入聊过，ta好像还在了解你。') {
        var exists = history.some(function(h) { return h.content === currentSummary && h.isCurrent; });
        if (!exists) {
            html += '<div class="timeline-item" style="border-left-color:#6c5ce7;">';
            html += '<div class="item-header"><span class="item-time">📌 当前摘要</span><div class="item-actions"><button class="del-btn" data-type="summary_current" title="删除"><i class="fas fa-times"></i></button></div></div>';
            html += '<div class="item-content">' + escapeHtml(currentSummary) + '</div>';
            html += '<div class="item-footer"><span class="item-badge" style="background:rgba(108,92,231,0.15);color:#6c5ce7;">最新</span></div>';
            html += '</div>';
        }
    }

    var sorted = history.slice().sort(function(a, b) {
        return new Date(b.time) - new Date(a.time);
    });

    sorted.forEach(function(item) {
        var timeDisplay = formatDateDisplay(item.time);
        html += '<div class="timeline-item">';
        html += '<div class="item-header"><span class="item-time">📅 ' + timeDisplay + '</span><div class="item-actions"><button class="del-btn" data-type="summary" data-id="' + item.id + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
        html += '<div class="item-content">' + escapeHtml(item.content) + '</div>';
        if (item.msgId) {
            html += '<div class="item-footer"><button class="jump-btn" data-msgid="' + item.msgId + '"><i class="fas fa-comment"></i> 跳转到聊天</button></div>';
        } else {
            html += '<div class="item-footer"><span class="item-badge">已归档</span></div>';
        }
        html += '</div>';
    });

    panel.innerHTML = html;

    panel.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var type = this.dataset.type;
            var id = this.dataset.id;
            if (type === 'summary_current') {
                showConfirm('删除当前摘要', '确定要删除当前摘要吗？', function() {
                    if (role.extendedState) {
                        role.extendedState.contextSummary = '你们还没有深入聊过，ta好像还在了解你。';
                        saveData();
                        renderSummary(role);
                        renderRelationCard(role);
                        showToast('✅ 已删除当前摘要');
                    }
                });
            } else if (type === 'summary' && id) {
                showConfirm('删除摘要', '确定要删除这条对话摘要吗？', function() {
                    if (role.extendedState && role.extendedState.summaryHistory) {
                        var idx = role.extendedState.summaryHistory.findIndex(function(s) { return s.id === id; });
                        if (idx !== -1) {
                            role.extendedState.summaryHistory.splice(idx, 1);
                            saveData();
                            renderSummary(role);
                            renderRelationCard(role);
                            showToast('✅ 已删除摘要');
                        }
                    }
                });
            }
        });
    });

    panel.querySelectorAll('.jump-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var msgId = this.dataset.msgid;
            var roleId = role.id;
            var frame = document.querySelector('.phone-frame');
            if (frame) {
                frame.classList.add('page-leaving');
                setTimeout(function() {
                    window.location.href = 'index.html?chat=' + roleId + '&msg=' + msgId;
                }, 350);
            } else {
                window.location.href = 'index.html?chat=' + roleId + '&msg=' + msgId;
            }
        });
    });
}

// ========== 生活日志 ==========
function renderLogs(role) {
    var panel = document.getElementById('panelLogs');
    if (!panel) return;
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var logs = role.extendedState ? role.extendedState.lifeLogs || [] : [];
    if (logs.length === 0) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>还没有生活日志</p><span class="empty-hint">AI会记录TA的日常点滴，多聊聊天吧 🌸</span></div>';
        return;
    }

    var sorted = logs.slice().sort(function(a, b) {
        return new Date(b.date) - new Date(a.date);
    });

    var html = '';
    sorted.forEach(function(log, index) {
        var timeDisplay = formatDateDisplay(log.date);
        var statusText = log.sent ? '已分享' : '待分享';
        var statusClass = log.sent ? '' : 'style="background:rgba(251,191,36,0.12);color:#fbbf24;"';
        html += '<div class="timeline-item" style="border-left-color:#fbbf24;">';
        html += '<div class="item-header"><span class="item-time">📅 ' + timeDisplay + '</span><div class="item-actions"><button class="del-btn" data-logidx="' + index + '" title="删除"><i class="fas fa-times"></i></button></div></div>';
        html += '<div class="item-content"><span class="item-emoji">' + (log.emoji || '📝') + '</span>' + escapeHtml(log.content) + '</div>';
        html += '<div class="item-footer"><span class="item-badge" ' + statusClass + '>' + statusText + '</span></div>';
        html += '</div>';
    });

    panel.innerHTML = html;

    panel.querySelectorAll('.del-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var logIdx = parseInt(this.dataset.logidx);
            showConfirm('删除日志', '确定要删除这条生活日志吗？', function() {
                if (role.extendedState && role.extendedState.lifeLogs && logIdx < role.extendedState.lifeLogs.length) {
                    role.extendedState.lifeLogs.splice(logIdx, 1);
                    saveData();
                    renderLogs(role);
                    renderRelationCard(role);
                    showToast('✅ 已删除日志');
                }
            });
        });
    });
}

// ========== 记忆库（折叠 + 搜索 + 批量管理 + 清理标签） ==========
function renderMemory(role) {
    var panel = document.getElementById('panelMemory');
    if (!panel) return;
    if (!role) {
        panel.innerHTML = '<div class="empty-state"><i class="fas fa-brain"></i><p>请先选择一个角色</p></div>';
        return;
    }

    var allMemories = role.memory || [];
    var html = '';

    // ===== 搜索框 =====
    html += '<div class="memory-search-bar">';
    html += '<input type="text" id="memorySearchInput" placeholder="🔍 搜索记忆..." value="' + escapeHtml(memorySearchKeyword) + '" />';
    html += '<button class="search-clear" id="memorySearchClear" ' + (memorySearchKeyword ? 'style="display:block;"' : '') + '><i class="fas fa-times-circle"></i></button>';
    html += '</div>';

    // ===== 批量操作栏 =====
    var hasSelected = selectedMemories.length > 0;
    html += '<div class="memory-batch-actions' + (hasSelected ? ' show' : '') + '" id="batchActions">';
    html += '<span class="batch-info">已选 <span id="selectedCount">' + selectedMemories.length + '</span> 条</span>';
    html += '<div class="batch-btns">';
    html += '<button class="btn-upgrade" id="batchUpgradeBtn"><i class="fas fa-arrow-up"></i> 升级</button>';
    html += '<button class="btn-delete" id="batchDeleteBtn"><i class="fas fa-trash-alt"></i> 删除</button>';
    html += '<button class="btn-cancel" id="batchCancelBtn">取消</button>';
    html += '</div></div>';

    // ===== 分类记忆 =====
    var filtered = allMemories;
    if (memorySearchKeyword.trim()) {
        var keyword = memorySearchKeyword.trim().toLowerCase();
        filtered = allMemories.filter(function(m) {
            return getMemoryText(m).toLowerCase().indexOf(keyword) !== -1;
        });
    }

    var core = filtered.filter(function(m) { return m.level === 'core' || !m.level; });
    var recent = filtered.filter(function(m) { return m.level === 'recent'; });
    var archived = filtered.filter(function(m) { return m.level === 'archived'; });

    if (filtered.length === 0) {
        if (allMemories.length === 0) {
            html += '<div class="empty-state"><i class="fas fa-inbox"></i><p>还没有保存任何记忆</p><span class="empty-hint">聊天中会慢慢积累关于你的事 📭</span></div>';
        } else {
            html += '<div class="empty-state"><i class="fas fa-search"></i><p>没有找到匹配的记忆</p><span class="empty-hint">试试其他关键词 🔍</span></div>';
        }
    }

    // ---- 核心记忆 ----
    html += renderCategory('核心记忆', 'core', core, '📌', '#a78bfa', true);

    // ---- 近期记忆 ----
    html += renderCategory('近期记忆', 'recent', recent, '🕐', '#fbbf24', false, '30天后自动归档');

    // ---- 归档记忆 ----
    html += renderCategory('归档记忆', 'archived', archived, '📦', '#94a3b8', false, '90天后自动删除');

    // ===== 添加记忆 =====
    html += '<div class="memory-add-section">';
    html += '<input type="text" id="memoryAddInput" placeholder="添加新记忆..." maxlength="100" />';
    html += '<button class="add-mem-btn" id="memoryAddBtn"><i class="fas fa-plus"></i> 添加</button>';
    html += '</div>';

    panel.innerHTML = html;

    // ===== 绑定搜索事件 =====
    var searchInput = document.getElementById('memorySearchInput');
    var searchClear = document.getElementById('memorySearchClear');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            memorySearchKeyword = this.value;
            if (searchClear) {
                searchClear.style.display = memorySearchKeyword ? 'block' : 'none';
            }
            selectedMemories = [];
            renderMemory(role);
        });
    }
    if (searchClear) {
        searchClear.addEventListener('click', function() {
            memorySearchKeyword = '';
            selectedMemories = [];
            renderMemory(role);
        });
    }

    // ===== 绑定分类折叠 =====
    document.querySelectorAll('.cat-header').forEach(function(header) {
        header.addEventListener('click', function(e) {
            if (e.target.closest('.cat-checkbox')) return;
            var catId = this.dataset.catId;
            if (catId && categoryStates[catId] !== undefined) {
                categoryStates[catId] = !categoryStates[catId];
                var body = this.nextElementSibling;
                var arrow = this.querySelector('.cat-arrow');
                if (body) body.classList.toggle('collapsed');
                if (arrow) arrow.classList.toggle('open');
            }
        });
    });

    // ===== 绑定分类全选 =====
    document.querySelectorAll('.cat-checkbox').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var catId = this.dataset.catId;
            var isChecked = this.checked;
            var items = document.querySelectorAll('.memory-item-check[data-cat="' + catId + '"] .item-checkbox');
            items.forEach(function(itemCb) {
                itemCb.checked = isChecked;
                itemCb.dispatchEvent(new Event('change'));
            });
        });
    });

    // ===== 绑定单项选择 =====
    document.querySelectorAll('.item-checkbox').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var text = this.dataset.text;
            if (this.checked) {
                if (selectedMemories.indexOf(text) === -1) {
                    selectedMemories.push(text);
                }
            } else {
                var idx = selectedMemories.indexOf(text);
                if (idx !== -1) {
                    selectedMemories.splice(idx, 1);
                }
            }
            var catId = this.dataset.catId;
            var items = document.querySelectorAll('.memory-item-check[data-cat="' + catId + '"] .item-checkbox');
            var checked = document.querySelectorAll('.memory-item-check[data-cat="' + catId + '"] .item-checkbox:checked');
            var catCb = document.querySelector('.cat-checkbox[data-cat-id="' + catId + '"]');
            if (catCb) {
                catCb.checked = items.length > 0 && checked.length === items.length;
            }
            updateBatchActions(role);
        });
    });

    // ===== 绑定批量操作 =====
    var batchUpgradeBtn = document.getElementById('batchUpgradeBtn');
    var batchDeleteBtn = document.getElementById('batchDeleteBtn');
    var batchCancelBtn = document.getElementById('batchCancelBtn');

    if (batchUpgradeBtn) {
        batchUpgradeBtn.addEventListener('click', function() {
            if (selectedMemories.length === 0) return;
            showConfirm('批量升级', '确定要将选中的 ' + selectedMemories.length + ' 条记忆升级为「核心记忆」吗？', function() {
                if (role.memory) {
                    var upgraded = 0;
                    role.memory.forEach(function(m) {
                        var text = getMemoryText(m);
                        if (selectedMemories.indexOf(text) !== -1 && m.level !== 'core') {
                            m.level = 'core';
                            upgraded++;
                        }
                    });
                    saveData();
                    selectedMemories = [];
                    renderMemory(role);
                    renderRelationCard(role);
                    showToast('✅ 已升级 ' + upgraded + ' 条记忆为核心记忆');
                }
            });
        });
    }

    if (batchDeleteBtn) {
        batchDeleteBtn.addEventListener('click', function() {
            if (selectedMemories.length === 0) return;
            showConfirm('批量删除', '确定要删除选中的 ' + selectedMemories.length + ' 条记忆吗？此操作不可恢复！', function() {
                if (role.memory) {
                    role.memory = role.memory.filter(function(m) {
                        var text = getMemoryText(m);
                        return selectedMemories.indexOf(text) === -1;
                    });
                    saveData();
                    var count = selectedMemories.length;
                    selectedMemories = [];
                    renderMemory(role);
                    renderRelationCard(role);
                    showToast('🗑️ 已删除 ' + count + ' 条记忆');
                }
            });
        });
    }

    if (batchCancelBtn) {
        batchCancelBtn.addEventListener('click', function() {
            selectedMemories = [];
            document.querySelectorAll('.item-checkbox').forEach(function(cb) { cb.checked = false; });
            document.querySelectorAll('.cat-checkbox').forEach(function(cb) { cb.checked = false; });
            updateBatchActions(role);
        });
    }

    // ===== 绑定升级单个 =====
    document.querySelectorAll('.btn-upgrade-item').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var text = this.dataset.text;
            if (role.memory) {
                var found = role.memory.find(function(m) {
                    return getMemoryText(m) === text && m.level !== 'core';
                });
                if (found) {
                    found.level = 'core';
                    saveData();
                    renderMemory(role);
                    renderRelationCard(role);
                    showToast('✅ 已升级为核心记忆');
                }
            }
        });
    });

    // ===== 绑定删除单个 =====
    document.querySelectorAll('.btn-del-item').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var text = this.dataset.text;
            showConfirm('删除记忆', '确定要删除这条记忆吗？', function() {
                if (role.memory) {
                    var idx = role.memory.findIndex(function(m) {
                        return getMemoryText(m) === text;
                    });
                    if (idx !== -1) {
                        role.memory.splice(idx, 1);
                        saveData();
                        renderMemory(role);
                        renderRelationCard(role);
                        showToast('✅ 已删除记忆');
                    }
                }
            });
        });
    });

    // ===== 绑定添加 =====
    var addInput = document.getElementById('memoryAddInput');
    var addBtn = document.getElementById('memoryAddBtn');

    function handleAddMemory() {
        if (isAddingMemory) return;
        var text = addInput ? addInput.value.trim() : '';
        if (!text) {
            showToast('⚠️ 请输入记忆内容');
            return;
        }
        isAddingMemory = true;
        if (addBtn) addBtn.disabled = true;
        if (!Array.isArray(role.memory)) role.memory = [];
        role.memory.push({ text: text, level: 'core', timestamp: Date.now() });
        saveData();
        if (addInput) addInput.value = '';
        memorySearchKeyword = '';
        selectedMemories = [];
        renderMemory(role);
        renderRelationCard(role);
        showToast('🧠 已添加核心记忆');
        isAddingMemory = false;
        if (addBtn) addBtn.disabled = false;
        if (addInput) addInput.focus();
    }

    if (addBtn) { addBtn.addEventListener('click', handleAddMemory); }
    if (addInput) {
        addInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); handleAddMemory(); }
        });
    }
}

function renderCategory(label, catId, items, icon, color, isCore, hint) {
    if (items.length === 0) {
        return '<div class="memory-category" style="opacity:0.3;"><div class="cat-header" style="cursor:default;background:transparent;border-color:transparent;"><span class="cat-icon">' + icon + '</span><span class="cat-name">' + label + '</span><span class="cat-count">0 条</span></div></div>';
    }

    var isOpen = categoryStates[catId] !== false;
    var arrowClass = isOpen ? 'open' : '';
    var bodyClass = isOpen ? '' : 'collapsed';

    var html = '<div class="memory-category">';
    html += '<div class="cat-header" data-cat-id="' + catId + '">';
    html += '<input type="checkbox" class="cat-checkbox" data-cat-id="' + catId + '" />';
    html += '<span class="cat-icon">' + icon + '</span>';
    html += '<span class="cat-name">' + label + '</span>';
    html += '<span class="cat-count">' + items.length + ' 条</span>';
    if (hint) {
        html += '<span class="cleanup-badge">' + hint + '</span>';
    }
    html += '<span class="cat-arrow ' + arrowClass + '"><i class="fas fa-chevron-down"></i></span>';
    html += '</div>';
    html += '<div class="cat-body ' + bodyClass + '">';

    items.forEach(function(mem) {
        var text = getMemoryText(mem);
        var isSelected = selectedMemories.indexOf(text) !== -1;
        var level = mem.level || 'core';
        var isCore = level === 'core' || !level;
        var isRecent = level === 'recent';
        var isArchived = level === 'archived';
        var showUpgrade = isRecent || isArchived;

        html += '<div class="memory-item-check" data-cat="' + catId + '">';
        html += '<input type="checkbox" class="item-checkbox" data-text="' + escapeHtml(text) + '" data-cat-id="' + catId + '" ' + (isSelected ? 'checked' : '') + ' />';
        html += '<span class="item-text">' + escapeHtml(text) + '</span>';
        html += '<div class="item-actions">';
        if (showUpgrade) {
            html += '<button class="btn-upgrade-item" data-text="' + escapeHtml(text) + '" title="升级为核心记忆"><i class="fas fa-arrow-up"></i></button>';
        }
        html += '<button class="btn-del-item" data-text="' + escapeHtml(text) + '" title="删除"><i class="fas fa-times"></i></button>';
        html += '</div>';
        html += '</div>';
    });

    html += '</div></div>';
    return html;
}

function updateBatchActions(role) {
    var el = document.getElementById('batchActions');
    var countEl = document.getElementById('selectedCount');
    if (el) {
        el.classList.toggle('show', selectedMemories.length > 0);
    }
    if (countEl) {
        countEl.textContent = selectedMemories.length;
    }
}

// ========== 确认弹窗 ==========
function showConfirm(title, message, callback) {
    var titleEl = document.getElementById('confirmTitle');
    var msgEl = document.getElementById('confirmMessage');
    var overlay = document.getElementById('confirmOverlay');
    if (titleEl) titleEl.textContent = title;
    if (msgEl) msgEl.textContent = message;
    if (overlay) overlay.classList.add('active');
    confirmCallback = callback;
}

document.getElementById('confirmBtn').addEventListener('click', function() {
    var overlay = document.getElementById('confirmOverlay');
    if (overlay) overlay.classList.remove('active');
    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});

document.getElementById('cancelBtn').addEventListener('click', function() {
    var overlay = document.getElementById('confirmOverlay');
    if (overlay) overlay.classList.remove('active');
    confirmCallback = null;
});

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) { this.classList.remove('active'); confirmCallback = null; }
});

// ========== 主渲染 ==========
function renderAll() {
    var role = getCurrentRole();
    if (!role) {
        var ps = document.getElementById('panelSummary');
        var pl = document.getElementById('panelLogs');
        var pm = document.getElementById('panelMemory');
        if (ps) ps.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        if (pl) pl.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        if (pm) pm.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>未找到角色</p></div>';
        return;
    }
    renderRelationCard(role);

    var panel = document.getElementById('panel' + currentTab.charAt(0).toUpperCase() + currentTab.slice(1));
    if (panel) {
        panel.style.animation = 'none';
        void panel.offsetHeight;
        panel.style.animation = 'fadeSlideIn 0.35s ease';
    }

    if (currentTab === 'summary') renderSummary(role);
    else if (currentTab === 'logs') renderLogs(role);
    else if (currentTab === 'memory') renderMemory(role);
}

// ========== Tab切换 ==========
function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentTab = this.dataset.tab;

            document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            var panelId = 'panel' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1);
            var panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');

            var role = getCurrentRole();
            if (currentTab === 'summary') renderSummary(role);
            else if (currentTab === 'logs') renderLogs(role);
            else if (currentTab === 'memory') {
                selectedMemories = [];
                renderMemory(role);
            }
        });
    });
}

// ========== 返回主应用 ==========
function goBack() {
    var frame = document.querySelector('.phone-frame');
    if (frame) {
        frame.classList.add('page-leaving');
        setTimeout(function() { window.location.href = 'index.html'; }, 350);
    } else {
        window.location.href = 'index.html';
    }
}

// ========== 刷新数据 ==========
function refreshData() {
    var btn = document.getElementById('refreshBtn');
    if (btn) {
        btn.style.transform = 'rotate(0deg)';
        btn.style.transition = 'transform 0.6s ease';
        btn.style.transform = 'rotate(360deg)';
    }
    loadData();
    renderRoleSelector();
    selectedMemories = [];
    renderAll();
    showToast('🔄 已刷新');
}

// ========== 存储监听 ==========
window.addEventListener('storage', function(e) {
    if (e.key === 'ds_multirole_v2') {
        console.log('📦 检测到数据变化，刷新中...');
        loadData();
        renderRoleSelector();
        selectedMemories = [];
        renderAll();
    }
});

// ========== 角色选择器 ==========
function bindRoleSelector() {
    var selector = document.getElementById('roleSelector');
    if (!selector) return;
    selector.addEventListener('change', function() {
        currentRoleId = this.value;
        selectedMemories = [];
        saveData();
        renderAll();
    });
}

// ========== 隐藏加载动画 ==========
function hideLoader() {
    var overlay = document.getElementById('loaderOverlay');
    if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(function() { overlay.style.display = 'none'; }, 600);
    }
}

// ========== 启动定时清理 ==========
function startCleanupTimer() {
    // 每天检查一次
    setInterval(function() {
        console.log('🧹 执行定时记忆清理...');
        cleanupMemories();
        // 如果当前在记忆库Tab，刷新视图
        if (currentTab === 'memory') {
            var role = getCurrentRole();
            if (role) renderMemory(role);
        }
    }, CLEANUP_RULES.CHECK_INTERVAL);
    console.log('🧹 记忆自动清理已启动（每天检查一次）');
}

// ========== 初始化 ==========
function init() {
    console.log('📦 时光胶囊 v1.3 初始化中...');

    var dataLoaded = loadData();

    if (dataLoaded) {
        renderRoleSelector();
        bindRoleSelector();
        setupTabs();
        renderAll();

        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

        // 启动定时清理
        startCleanupTimer();

        console.log('📦 时光胶囊 v1.3 已加载');
        console.log('📊 共 ' + roles.length + ' 个角色');
        var currentRole = getCurrentRole();
        console.log('💕 当前角色: ' + (currentRole ? currentRole.name : '无'));
        console.log('🧹 清理规则: 近期记忆30天→归档, 归档记忆90天→删除');
    } else {
        var ps = document.getElementById('panelSummary');
        if (ps) {
            ps.innerHTML = '<div class="empty-state"><i class="fas fa-database"></i><p>请先打开主应用</p><span class="empty-hint">在「我的AI空间」中创建角色后，再来这里查看时光胶囊 📦</span></div>';
        }
    }

    setTimeout(hideLoader, 800);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>
